# GUARD — generate/cluster config
# Model : Llama-3.2-1B-Instruct (16 layers) fine-tuned on TOFU
# Split : forget10 (10 % of TOFU authors)
# Layer : 4  (1/4 × 16)
# Run   : guard cluster configs/examples/tofu_1b_forget10.yaml

model_name: open-unlearning/tofu_Llama-3.2-1B-Instruct_full
layers: [4]
method: orthogonal
module_name: residual
token_position: mean

normalizations:
  sv_scaling: activation_norm
  rotation_only: true
  projection_eps: 1.0e-6

dataset:
  type: tofu
  forget_split: forget10

clustering:
  n_clusters: auto
  k_min: 2
  k_max: 20
  embed_model: all-MiniLM-L6-v2

batch_size: 128
max_length: 512
output_dir: steering_vectors/
seed: 0
